name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  POSTGRES_USER: parking
  POSTGRES_PASSWORD: parking_secret
  POSTGRES_DB: smart_parking_test
  DATABASE_URL: postgresql+asyncpg://parking:parking_secret@localhost:5432/smart_parking_test
  DATABASE_URL_SYNC: postgresql+psycopg2://parking:parking_secret@localhost:5432/smart_parking_test
  REDIS_URL: redis://localhost:6379/15
  CELERY_BROKER_URL: redis://localhost:6379/14
  CELERY_RESULT_BACKEND: redis://localhost:6379/13
  SECRET_KEY: ci-test-secret-key-do-not-use-in-production
  SENSOR_WEBHOOK_API_KEY: ci-test-sensor-webhook-key

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black
          pip install -r requirements.txt

      - name: Run flake8
        run: flake8 app tests

      - name: Run black (check only)
        run: black --check app tests

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U parking -d smart_parking_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run pytest
        run: pytest -v --cov=app --cov-report=term-missing

  docker-build:
    name: Docker Build (dry run)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Prepare compose env file
        run: cp .env.example .env

      - name: Validate docker compose config
        run: docker compose config

      - name: Build backend image
        run: docker build -t smart-parking-api:ci .

      - name: Build frontend image
        run: docker build -t smart-parking-frontend:ci ./frontend
